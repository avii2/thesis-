config_version: 1
experiment_group: baseline_flat
description: Flat per-cluster FL baseline from docs/EXPERIMENT_MATRIX.csv
source_of_truth:
  architecture_contract: docs/ARCHITECTURE_CONTRACT.md
  data_contract: docs/DATA_CONTRACT.md
  experiment_matrix: docs/EXPERIMENT_MATRIX.csv
ledger:
  metadata_only: true
training_defaults:
  rounds: 50
  local_epochs: 1
  batch_size: 128
  seeds:
    - 42
    - 123
    - 2025
smoke_test_defaults:
  rounds: 2
  local_epochs: 1
  batch_size: 64
  seed: 42
clusters:
  - experiment_id: A_C1
    cluster_config: configs/cluster1_hai.yaml
    hierarchy: flat
    clustering_method: none
    n_subclusters: 0
    model_family: cnn1d
    fl_method: FedAvg
    aggregation: weighted_arithmetic_mean
  - experiment_id: A_C2
    cluster_config: configs/cluster2_ton_iot.yaml
    hierarchy: flat
    clustering_method: none
    n_subclusters: 0
    model_family: cnn1d
    fl_method: FedAvg
    aggregation: weighted_arithmetic_mean
  - experiment_id: A_C3
    cluster_config: configs/cluster3_wustl.yaml
    hierarchy: flat
    clustering_method: none
    n_subclusters: 0
    model_family: cnn1d
    fl_method: FedAvg
    aggregation: weighted_arithmetic_mean
runtime_validation:
  require_cluster_configs_to_exist: true
  require_ledger_metadata_only: true
