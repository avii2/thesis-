config_version: 1
ablation_id: ablation_hierarchy_effect
description: Required hierarchy-effect ablation using Baseline A versus Baseline B per cluster.
source_of_truth:
  architecture_contract: docs/ARCHITECTURE_CONTRACT.md
  implementation_spec: docs/FCFL_IMPLEMENTATION_SPEC.md
  experiment_matrix: docs/EXPERIMENT_MATRIX.csv
training_defaults:
  rounds: 50
  local_epochs: 1
  batch_size: 128
  seeds:
    - 42
    - 123
    - 2025
smoke_test_defaults:
  rounds: 2
  local_epochs: 1
  batch_size: 64
  seed: 42
comparisons:
  - comparison_id: ablation_hierarchy_effect_c1
    title: Hierarchy Effect Cluster 1
    control:
      experiment_id: A_C1
      run_source: standard
      label: Baseline A
    treatment:
      experiment_id: B_C1
      run_source: standard
      label: Baseline B
  - comparison_id: ablation_hierarchy_effect_c2
    title: Hierarchy Effect Cluster 2
    control:
      experiment_id: A_C2
      run_source: standard
      label: Baseline A
    treatment:
      experiment_id: B_C2
      run_source: standard
      label: Baseline B
  - comparison_id: ablation_hierarchy_effect_c3
    title: Hierarchy Effect Cluster 3
    control:
      experiment_id: A_C3
      run_source: standard
      label: Baseline A
    treatment:
      experiment_id: B_C3
      run_source: standard
      label: Baseline B
runtime_validation:
  require_frozen_memberships_for_hierarchical_arm: true
