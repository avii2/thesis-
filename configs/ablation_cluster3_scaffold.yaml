config_version: 1
ablation_id: ablation_cluster3_fedavg_vs_scaffold
description: Required Cluster 3 FL-method ablation comparing hierarchical 1D-CNN FedAvg against hierarchical 1D-CNN SCAFFOLD.
source_of_truth:
  architecture_contract: docs/ARCHITECTURE_CONTRACT.md
  implementation_spec: docs/FCFL_IMPLEMENTATION_SPEC.md
  experiment_matrix: docs/EXPERIMENT_MATRIX.csv
training_defaults:
  rounds: 50
  local_epochs: 1
  batch_size: 128
  seeds:
    - 42
    - 123
    - 2025
smoke_test_defaults:
  rounds: 2
  local_epochs: 1
  batch_size: 64
  seed: 42
comparisons:
  - comparison_id: ablation_cluster3_fedavg_vs_scaffold
    title: Cluster 3 FedAvg vs SCAFFOLD
    control:
      experiment_id: AB_C3_FEDAVG_CNN1D
      run_source: custom_cluster3_fedavg_cnn1d
      label: FedAvg 1D-CNN Control
      cluster_id: 3
      cluster_config: configs/cluster3_wustl.yaml
      membership_file: outputs/clustering/cluster3_memberships.json
      hierarchy: hierarchical_fixed
      clustering_method: agglomerative
      n_subclusters: 3
      descriptor: feature_mean_std
      model_family: cnn1d
      fl_method: FedAvg
      aggregation: weighted_arithmetic_mean
      learning_rate: 0.05
    treatment:
      experiment_id: P_C3
      run_source: standard
      label: SCAFFOLD 1D-CNN
runtime_validation:
  reuse_frozen_memberships: true
