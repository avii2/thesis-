config_version: 1
ablation_id: ablation_cluster2_fedavg_vs_fedprox
description: Required Cluster 2 FL-method ablation comparing hierarchical compact-MLP FedAvg against hierarchical compact-MLP FedProx.
source_of_truth:
  architecture_contract: docs/ARCHITECTURE_CONTRACT.md
  implementation_spec: docs/FCFL_IMPLEMENTATION_SPEC.md
  experiment_matrix: docs/EXPERIMENT_MATRIX.csv
training_defaults:
  rounds: 50
  local_epochs: 1
  batch_size: 128
  seeds:
    - 42
    - 123
    - 2025
smoke_test_defaults:
  rounds: 2
  local_epochs: 1
  batch_size: 64
  seed: 42
comparisons:
  - comparison_id: ablation_cluster2_fedavg_vs_fedprox
    title: Cluster 2 FedAvg vs FedProx
    control:
      experiment_id: AB_C2_FEDAVG_MLP
      run_source: custom_cluster2_fedavg_mlp
      label: FedAvg compact MLP Control
      cluster_id: 2
      cluster_config: configs/cluster2_ton_iot.yaml
      membership_file: outputs/clustering/cluster2_memberships.json
      hierarchy: hierarchical_fixed
      clustering_method: agglomerative
      n_subclusters: 3
      descriptor: feature_mean_std
      model_family: compact_mlp
      fl_method: FedAvg
      aggregation: weighted_arithmetic_mean
      learning_rate: 0.001
    treatment:
      experiment_id: P_C2
      run_source: standard
      label: FedProx compact MLP
runtime_validation:
  reuse_frozen_memberships: true
