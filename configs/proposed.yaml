config_version: 1
experiment_group: proposed_specialized_hierarchical
description: Proposed specialized hierarchical FCFL configuration from docs/EXPERIMENT_MATRIX.csv
source_of_truth:
  architecture_contract: docs/ARCHITECTURE_CONTRACT.md
  data_contract: docs/DATA_CONTRACT.md
  experiment_matrix: docs/EXPERIMENT_MATRIX.csv
ledger:
  metadata_only: true
training_defaults:
  rounds: 50
  local_epochs: 1
  batch_size: 128
  seeds:
    - 42
    - 123
    - 2025
smoke_test_defaults:
  rounds: 2
  local_epochs: 1
  batch_size: 64
  seed: 42
clustering_defaults:
  method: AgglomerativeClustering
  linkage: ward
  metric: euclidean
  descriptor: feature_mean_std
  reuse_frozen_memberships: true
clusters:
  - experiment_id: P_C1
    cluster_config: configs/cluster1_hai.yaml
    hierarchy: hierarchical_fixed
    clustering_method: agglomerative
    n_subclusters: 2
    descriptor: feature_mean_std
    membership_file: outputs/clustering/cluster1_memberships.json
    model_family: tcn
    fl_method: FedBN
    aggregation: weighted_non_bn_mean
  - experiment_id: P_C2
    cluster_config: configs/cluster2_ton_iot.yaml
    hierarchy: hierarchical_fixed
    clustering_method: agglomerative
    n_subclusters: 3
    descriptor: feature_mean_std
    membership_file: outputs/clustering/cluster2_memberships.json
    model_family: compact_mlp
    fl_method: FedProx
    aggregation: weighted_arithmetic_mean
  - experiment_id: P_C3
    cluster_config: configs/cluster3_wustl.yaml
    hierarchy: hierarchical_fixed
    clustering_method: agglomerative
    n_subclusters: 3
    descriptor: feature_mean_std
    membership_file: outputs/clustering/cluster3_memberships.json
    model_family: cnn1d
    fl_method: SCAFFOLD
    aggregation: weighted_arithmetic_mean
runtime_validation:
  require_cluster_configs_to_exist: true
  require_frozen_membership_files_before_training: true
  require_ledger_metadata_only: true
